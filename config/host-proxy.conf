events {
    worker_connections 1024;
}

http {
    # 1. The Startup Resolvers
    # Nginx resolves these at boot using the OS resolver (which reads /etc/hosts).
    # add new mappings here.
    # example jetbrains mappings
    upstream mcp_64342 { server host.docker.internal:64342; }
    upstream mcp_64343 { server host.docker.internal:64343; }
    upstream mcp_64344 { server host.docker.internal:64344; }

    server {
        listen 80;

        location / {
            # 2. Extract the port from the header
            set $target_port $http_x_target_port;

            # Fallback if Bifrost doesn't send the header
            if ($target_port = "") {
                set $target_port 64342;
            }

            # 3. Dynamic Routing to Static Upstreams
            # This completely bypasses the Nginx runtime resolver trap
            proxy_pass http://mcp_$target_port;

            # 4. Dynamic Host Header Forgery
            proxy_set_header Host 127.0.0.1:$target_port;

            # The SSE Survival Kit
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }
    }
}